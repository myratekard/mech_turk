kind = "web"
previewPath = "/"
title = "Turk"
version = "1.0.0"
id = "artifacts/turk"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22039

[services.development]
run = "pnpm --filter @workspace/turk run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/turk", "run", "build" ]
publicDir = "artifacts/turk/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22039"
BASE_PATH = "/"
